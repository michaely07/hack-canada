services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: statutelens
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d statutelens"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://dev:dev@db:5432/statutelens
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app/api
      - ./etl:/app/etl
      - ./laws-lois-xml:/app/laws-lois-xml

volumes:
  pgdata:
